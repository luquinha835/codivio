<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Codivio IDE</title>

<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

<style>

body{
margin:0;
background:#050505;
font-family:monospace;
color:#00ff9c;
overflow:hidden;
}

/* topo */

header{
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
border-bottom:1px solid #00ff9c;
padding:10px;
}

header h1{
margin:0;
color:#00ff9c;
}

button{
background:black;
border:1px solid #00ff9c;
color:#00ff9c;
padding:6px 10px;
cursor:pointer;
}

button:hover{
background:#00ff9c;
color:black;
}

/* layout */

.container{
display:grid;
grid-template-columns:1fr 1fr;
height:calc(100vh - 50px);
}

/* editor */

.editorBox{
height:60%;
border-right:1px solid #00ff9c;
}

/* preview */

.preview{
height:60%;
background:white;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* terminal */

.terminal{
height:40%;
background:#000;
border-top:1px solid #00ff9c;
padding:10px;
overflow:auto;
}

#terminalInput{
width:100%;
background:black;
color:#00ff9c;
border:none;
outline:none;
}

</style>
</head>

<body>

<header>

<h1>💻 Codivio IDE</h1>

<div>

<select id="lang">

<option value="html">HTML</option>
<option value="css">CSS</option>
<option value="javascript">JavaScript</option>
<option value="python">Python</option>
<option value="c">C</option>

</select>

<button onclick="run()">▶ Run</button>
<button onclick="save()">💾 Save</button>
<input type="file" onchange="openFile(event)">

</div>

</header>

<div class="container">

<div>

<div class="editorBox">
<textarea id="editor"></textarea>
</div>

<div class="terminal" id="terminal">

<div>Codivio Terminal</div>

<input id="terminalInput" placeholder="digite comando..." onkeydown="terminalCmd(event)">

</div>

</div>

<div class="preview">
<iframe id="preview"></iframe>
</div>

</div>

<!-- CodeMirror -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>

<script>

/* editor */

let editor = CodeMirror.fromTextArea(
document.getElementById("editor"),
{
lineNumbers:true,
theme:"dracula",
mode:"javascript"
}
)

/* mudar linguagem */

document.getElementById("lang").onchange=function(){

editor.setOption("mode",this.value)

}

/* executar */

function run(){

let code=editor.getValue()

let lang=document.getElementById("lang").value

if(lang==="html"){

document.getElementById("preview").srcdoc=code

}

else if(lang==="css"){

document.getElementById("preview").srcdoc=
"<style>"+code+"</style>"

}

else if(lang==="javascript"){

document.getElementById("preview").srcdoc=
"<script>"+code+"<\/script>"

}

else{

terminal("Executando "+lang+"... (simulação)")

}

}

/* terminal */

function terminal(text){

let t=document.getElementById("terminal")

t.innerHTML+= "<div>"+text+"</div>"

t.scrollTop=t.scrollHeight

}

function terminalCmd(e){

if(e.key!=="Enter")return

let cmd=e.target.value

terminal("> "+cmd)

if(cmd==="help"){

terminal("comandos: help, clear")

}

else if(cmd==="clear"){

document.getElementById("terminal").innerHTML=""

}

else{

terminal("comando desconhecido")

}

e.target.value=""

}

/* salvar */

function save(){

localStorage.setItem("codivioCode",editor.getValue())

alert("salvo")

}

/* abrir */

function openFile(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

editor.setValue(reader.result)

}

reader.readAsText(file)

}

/* atalhos */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="Enter"){

run()

}

if(e.ctrlKey && e.key==="s"){

e.preventDefault()

save()

}

})

</script>

</body>
</html>
